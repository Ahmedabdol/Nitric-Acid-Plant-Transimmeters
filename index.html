<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS - Ahmed Abdelaal | NCIC Master Database</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="data.js"></script> 

    <style>
        :root { --primary: #001a33; --secondary: #e67e22; --success: #27ae60; --danger: #c0392b; --info: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; min-height: 100vh; position: relative; color: #1a1a1a; }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/DfbZ7yBs/Nitric-acid-20260206-014336.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed; opacity: 0.6; z-index: -1;
        }
        .user-header { text-align: right; font-weight: 900; font-size: 32px; color: #000; margin-bottom: 10px; text-transform: uppercase; }
        .container { max-width: 1500px; margin: auto; background: rgba(255, 255, 255, 0.98); padding: 25px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); }
        .header-title { background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 25px; border-bottom: 5px solid var(--secondary); }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--secondary); }
        .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
        .field label { font-weight: bold; color: var(--primary); font-size: 13px; }
        input, select { padding: 10px; border: 2px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; }

        #searchBar { width: 100%; padding: 18px; border-radius: 40px; border: 3px solid var(--primary); font-size: 18px; margin-bottom: 20px; outline: none; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .label-highlight { color: var(--secondary); font-weight: bold; }
        .table-area { max-height: 450px; overflow-y: auto; background: white; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 5; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
        tr:hover { background: #f0f7ff; cursor: pointer; }
        .tag-id { font-weight: bold; color: var(--info); font-family: monospace; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 8% auto; padding: 30px; width: 70%; border-radius: 20px; position: relative; border-right: 12px solid var(--secondary); }
        .close-btn { position: absolute; left: 20px; top: 10px; font-size: 30px; cursor: pointer; color: var(--danger); }
        
        /* كلاس اللون الأحمر للقيم الخطرة */
        .critical-alarm { color: #ff0000; font-weight: 900; text-decoration: underline; }
    </style>
</head>
<body>

<div class="user-header">Ahmed Abdelaal</div>
<div class="container">
    <div class="header-title">
        <h1>NITRIC ACID PLANT TRANSMITTERS</h1>
        <p></p>
    </div>

    <div class="toolbar">
        <div class="field"><label>Type</label><select id="inType"><option>Analyzers</option><option>Flow</option><option>Pressure</option><option>Level</option><option>Temperature</option><option>Mech/Vib</option></select></div>
        <div class="field"><label>Tag ID</label><input type="text" id="inTag"></div>
        <div class="field" style="flex: 2;"><label>Description</label><input type="text" id="inDesc"></div>
        <div class="field"><label>Threshold</label><input type="text" id="inLimit"></div>
        <input type="hidden" id="editIdx">
        <button id="addBtn" class="btn" style="background:var(--success)" onclick="saveEntry()">+ إضافة</button>
        <button id="upBtn" class="btn" style="background:var(--secondary); display:none;" onclick="updateEntry()">حفظ</button>
        <button class="btn" style="background:#1d6f42" onclick="toExcel()">Excel</button>
        <button class="btn" style="background:#e74c3c" onclick="toPDF()">PDF</button>
    </div>

    <input type="text" id="searchBar" oninput="searchData()" placeholder="🔍 ابحث بالـ Tag أو Description للبدء...">

    <div class="table-area">
        <table>
            <thead>
                <tr>
                    <th><span class="label-highlight">Type</span></th>
                    <th>Tag ID</th>
                    <th><span class="label-highlight">Description</span></th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="rows">
                <tr><td colspan="4" style="text-align:center; padding:50px; color:#888;">ابدأ البحث لعرض النتائج...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color:var(--primary)"></h2>
        <div id="modalBody"></div>
        <div style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;">
            <button id="editBtnM" class="btn" style="background:var(--info)">✏️ تعديل</button>
            <button id="delBtnM" class="btn" style="background:var(--danger)">🗑️ حذف</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ahmed_master_v10')) || externalData;

    function sync() { localStorage.setItem('ahmed_master_v10', JSON.stringify(db)); }

    function searchData() {
        const q = document.getElementById('searchBar').value.toUpperCase().trim();
        const body = document.getElementById('rows');
        
        if (q === "") {
            body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px; color:#888;">ابدأ البحث لعرض النتائج...</td></tr>';
            return;
        }
        
        const filtered = db.filter(i => 
            (i.t && i.t.toUpperCase().includes(q)) || 
            (i.s && i.s.toUpperCase().includes(q))
        );
        
        if (filtered.length === 0) {
            body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px;">لا توجد نتائج مطابقة</td></tr>';
            return;
        }
        
        body.innerHTML = filtered.map(item => {
            const idx = db.findIndex(x => x.t === item.t);
            return `<tr onclick="showDetails(${idx})">
                <td style="font-weight:600">${item.c}</td>
                <td class="tag-id">${item.t}</td>
                <td>${item.s}</td>
                <td><button class="btn" style="background:var(--danger); padding:4px 8px;" onclick="event.stopPropagation(); del(${idx})">🗑️</button></td>
            </tr>`;
        }).join('');
    }

    function showDetails(idx) {
        const i = db[idx];
        document.getElementById('modalTitle').innerText = "Tag: " + i.t;
        
        // --- تعديل تلوين ZAHH و ZALL ---
        let thresholdHTML = i.l || "N/A";
        // بنستخدم RegExp عشان نغير كل الكلمات حتى لو اتكررت
        thresholdHTML = thresholdHTML.replace(/ZAHH/g, '<span class="critical-alarm">ZAHH</span>');
        thresholdHTML = thresholdHTML.replace(/ZALL/g, '<span class="critical-alarm">ZALL</span>');
        // ------------------------------

        document.getElementById('modalBody').innerHTML = `
            <p><span class="label-highlight">Description:</span> ${i.s}</p>
            <p><span class="label-highlight">Type:</span> ${i.c}</p>
            <div style="background:#fff3cd; padding:20px; border-radius:10px; border:1px solid #ffeeba;">
                <b style="color:#856404; font-size:18px;">Threshold Values:</b><br>
                <div style="font-size:22px; font-weight:bold; margin-top:10px; line-height:1.6;">${thresholdHTML}</div>
            </div>`;
            
        document.getElementById('editBtnM').onclick = () => edit(idx);
        document.getElementById('delBtnM').onclick = () => del(idx);
        document.getElementById('detailModal').style.display = "block";
    }

    // بقية دوال CRUD (إضافة، تعديل، حذف، تصدير)
    function saveEntry() {
        const t=document.getElementById('inTag').value, s=document.getElementById('inDesc').value, c=document.getElementById('inType').value, l=document.getElementById('inLimit').value;
        if(!t || !s) return alert("أكمل البيانات!");
        db.unshift({c,t,s,l}); sync(); searchData(); clear();
    }
    function del(idx) { if(confirm("حذف؟")) { db.splice(idx,1); sync(); searchData(); closeModal(); } }
    function edit(idx) {
        const i=db[idx]; document.getElementById('inTag').value=i.t; document.getElementById('inDesc').value=i.s; document.getElementById('inLimit').value=i.l;
        document.getElementById('editIdx').value=idx; document.getElementById('addBtn').style.display='none'; document.getElementById('upBtn').style.display='flex';
        closeModal(); window.scrollTo(0,0);
    }
    function updateEntry() {
        const idx=document.getElementById('editIdx').value;
        db[idx]={c:document.getElementById('inType').value, t:document.getElementById('inTag').value, s:document.getElementById('inDesc').value, l:document.getElementById('inLimit').value};
        sync(); searchData(); clear(); document.getElementById('addBtn').style.display='flex'; document.getElementById('upBtn').style.display='none';
    }
    function clear() { document.getElementById('inTag').value=""; document.getElementById('inDesc').value=""; document.getElementById('inLimit').value=""; }
    function closeModal() { document.getElementById('detailModal').style.display="none"; }
    function toExcel() { const ws=XLSX.utils.json_to_sheet(db); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "NCIC_Export.xlsx"); }
    function toPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text("Transmitters Report", 14, 15); doc.autoTable({head: [['Type', 'Tag', 'Description', 'Threshold']], body: db.map(i=>[i.c, i.t, i.s, i.l]), startY: 25}); doc.save("Report.pdf"); }
    window.onclick=(e)=>{if(e.target==document.getElementById('detailModal')) closeModal();}
</script>
</body>
</html>
