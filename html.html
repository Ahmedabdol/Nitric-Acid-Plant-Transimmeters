        body {

            margin: 0; padding: 20px;
            min-height: 100vh;
            position: relative;
        }

        /* تنسيق الخلفية بالشفافية المطلوبة */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/DfbZ7yBs/Nitric-acid-20260206-014336.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.65; /* الشفافية المطلوبة */
            z-index: -1;
        }

        .user-header { text-align: right; font-weight: bold; font-size: 28px; color: #000; margin-bottom: 10px; padding-right: 15px; border-right: 5px solid var(--secondary); }

        .container { max-width: 1550px; margin: auto; background: rgba(255, 255, 255, 0.93); padding: 25px; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); }
        
        .header-title { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        
        /* Toolbar */
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; align-items: flex-end; border-top: 5px solid var(--secondary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(0,34,68,0.2); }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-add { background: var(--success); }
        .btn-update { background: var(--secondary); display: none; }
        .btn-excel { background: #1d6f42; }
        .btn-pdf { background: #c0392b; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); opacity: 0.9; }

        #searchBar { width: 100%; padding: 18px 30px; border-radius: 50px; border: 3px solid var(--primary); font-size: 18px; margin-bottom: 25px; outline: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Table Style */
        .table-area { max-height: 550px; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f3f5; color: var(--primary); padding: 15px; border-bottom: 3px solid #ddd; text-align: right; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: right; font-size: 14px; }
        tr:hover { background: #f0f7ff; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; display: inline-block; min-width: 80px; text-align: center; }
        .cat-analyzers { background: #e0e0e0; color: #333; }
        .cat-flow { background: #e8f5e9; color: #1b5e20; }
        .cat-pressure { background: #e3f2fd; color: #0d47a1; }
        .cat-level { background: #f3e5f5; color: #4a148c; }
        .cat-temperature { background: #fff3e0; color: #e65100; }
        .cat-mech { background: #ffebee; color: #b71c1c; }

        .tag-id { font-family: 'Consolas', monospace; font-weight: bold; color: var(--info); cursor: pointer; }
        .action-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .hidden { display: none; }
    </style>
</head>

            <tr>
                <td><span class="badge cat-${item.c.toLowerCase().split('/')[0]}">${item.c}</span></td>
                <td class="tag-id" onclick="copyTag('${item.t}')">${item.t}</td>
                <td>${item.s}</td>
                <td class="action-btns">
                    <button class="btn btn-sm" style="background:#3498db;" onclick="startEdit(${i})">✏️</button>
                    <button class="btn btn-sm" style="background:#e74c3c;" onclick="deleteEntry(${i})">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function saveEntry() {
        const c = document.getElementById('inCat').value;
        const t = document.getElementById('inTag').value;
        const s = document.getElementById('inService').value;
        if(!t || !s) return alert("املا البيانات يا هندسة!");
        db.unshift({c, t, s});
        sync();
        clear();
    }

    function startEdit(i) {
        const item = db[i];
        document.getElementById('inCat').value = item.c;
        document.getElementById('inTag').value = item.t;
        document.getElementById('inService').value = item.s;
        document.getElementById('editIdx').value = i;
        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('upBtn').style.display = 'block';
        window.scrollTo(0,0);
    }

    function updateEntry() {
        const i = document.getElementById('editIdx').value;
        db[i] = { c: document.getElementById('inCat').value, t: document.getElementById('inTag').value, s: document.getElementById('inService').value };
        document.getElementById('addBtn').style.display = 'block';
        document.getElementById('upBtn').style.display = 'none';
        sync();
        clear();
    }

    function deleteEntry(i) {
        if(confirm("متاكد انك عاوز تمسح الجهاز ده؟")) { db.splice(i, 1); sync(); }
    }

    function sync() { localStorage.setItem('ncic_final_v2', JSON.stringify(db)); render(); }
    function clear() { document.getElementById('inTag').value = ''; document.getElementById('inService').value = ''; }
    function copyTag(t) { navigator.clipboard.writeText(t); alert("تم النسخ: " + t); }

    document.getElementById('searchBar').addEventListener('input', function(e) {
        const v = e.target.value.toUpperCase();
        document.querySelectorAll('#rows tr').forEach(tr => tr.classList.toggle('hidden', !tr.innerText.toUpperCase().includes(v)));
    });

    function toExcel() {
        const ws = XLSX.utils.json_to_sheet(db);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Transmitters");
        XLSX.writeFile(wb, "NCIC_Registry_Master.xlsx");
    }

    function toPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("NCIC Instrument Index - Ahmed Abdelaal", 14, 15);
        doc.autoTable({ head: [['Category', 'Tag', 'Service']], body: db.map(d => [d.c, d.t, d.s]), startY: 20 });
        doc.save("NCIC_Database_Master.pdf");
    }

    render();
</script>
</body>
</html>
